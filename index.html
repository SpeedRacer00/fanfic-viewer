<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        /* --- THEME DEFINITIONS --- */
        :root {
            --bg: #1b2838;
            --header: #171a21;
            --border: #2a475e;
            --text: #c7d5e0;
            --user-bg: #2a475e;
            --user-text: #66c0f4;
            --ai-bg: rgba(30, 32, 38, 0.8);
            --ai-text: #ffffff;
            --header-text: #66c0f4;
            --bubble-outline: 1px solid var(--border);
        }
        
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #dbdee1; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; --bubble-outline: 1px solid var(--border); }
        body.theme-messenger { --bg: #000000; --header: #121212; --border: #222; --text: #fff; --user-bg: #0084ff; --user-text: #fff; --ai-bg: #242526; --ai-text: #fff; --header-text: #fff; --bubble-outline: none; }
        body.theme-whatsapp { --bg: #0b141a; --header: #202c33; --border: #222d34; --text: #e9edef; --user-bg: #005c4b; --user-text: #e9edef; --ai-bg: #202c33; --ai-text: #e9edef; --header-text: #fff; --bubble-outline: none; }
        body.theme-chatgpt { --bg: #212121; --header: #212121; --border: #3d3d3d; --text: #ececec; --user-bg: #2f2f2f; --user-text: #ececec; --ai-bg: transparent; --ai-text: #ececec; --header-text: #ececec; --bubble-outline: none; }
        
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            display: flex; flex-direction: column;
            padding-top: 60px;
            overflow-y: auto;
            position: relative;
        }

        /* OVERHAULED BG LAYER */
        #fixed-bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10;
            background-color: var(--bg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        #image-bg-element {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            display: block;
        }

        body.has-bg-image #image-bg-element { opacity: 1; }
        /* Hide the fallback color if image is present */
        body.has-bg-image #fixed-bg-layer { background-color: transparent; }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            padding: 0 12px; background: var(--header);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 9999; color: var(--header-text);
            box-sizing: border-box;
        }

        .controls { display: flex; gap: 5px; align-items: center; }
        select, .btn-ui { background: #444; color: #fff; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #custom-panel {
            display: none; background: var(--header); padding: 8px 12px;
            border-bottom: 1px solid var(--border); gap: 12px; align-items: center; justify-content: center;
            position: fixed; top: 60px; left: 0; width: 100%; z-index: 9998; box-sizing: border-box; flex-wrap: wrap;
        }
        .color-group { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: bold; color: var(--header-text); }
        
        input[type="color"] {
            -webkit-appearance: none; border: 1px solid #555; width: 18px; height: 18px; 
            cursor: pointer; background: none; padding: 0; border-radius: 2px;
        }

        #chat-container { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; width: calc(100% - 40px); position: relative; z-index: 1; }

        .bubble {
            max-width: 85%; padding: 15px; border-radius: 18px; line-height: 1.6;
            word-wrap: break-word; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            background: var(--ai-bg); color: var(--ai-text);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: var(--bubble-outline);
        }
        .user { align-self: flex-end; background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; border: none !important; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .label { font-size: 0.7em; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; opacity: 0.8; }
        #drop-zone { border: 2px dashed #66c0f4; padding: 60px 20px; text-align: center; margin: 40px auto; width: 80%; max-width: 600px; border-radius: 10px; cursor: pointer; background: rgba(0,0,0,0.4); }
    </style>
</head>
<body id="main-body">

<div id="fixed-bg-layer">
    <img id="image-bg-element" src="" alt="">
</div>

<header>
    <div style="display:flex; align-items:baseline; gap:6px; overflow:hidden;">
        <span id="header-title" style="font-weight:bold;">Fanfic Viewer</span>
        <span id="file-name-display" style="font-size:0.8em; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
    </div>
    <div class="controls">
        <button id="toggle-custom" class="btn-ui">⚙️</button>
        <select id="theme-select">
            <option value="default">Steam Blue</option>
            <option value="theme-chatgpt">ChatGPT</option>
            <option value="theme-discord">Discord</option>
            <option value="theme-messenger">Messenger</option>
            <option value="theme-whatsapp">WhatsApp</option>
            <option value="custom">Custom</option>
        </select>
        <button id="reset-page" class="btn-ui" style="display:none;">New</button>
    </div>
</header>

<div id="custom-panel">
    <div class="color-group">HDR <input type="color" id="headerColor" value="#171a21"></div>
    <div class="color-group">BG <input type="color" id="bgColor" value="#1b2838"></div>
    <div class="color-group">USR <input type="color" id="userColor" value="#2a475e"></div>
    <div class="color-group">AI <input type="color" id="aiColor" value="#1e2026"></div>
    <div style="display:flex; gap:4px;">
        <input type="file" id="bgUpload" accept="image/*" style="font-size:9px; width:110px;">
        <button id="clear-bg" class="btn-ui">❌</button>
    </div>
    <button id="save-theme" class="btn-ui" style="background:#28a745; border:none; padding: 3px 8px;">Save</button>
</div>

<div id="drop-zone">Click or drop your fanfic here.</div>
<div id="chat-container"></div>

<script>
    const themeSelect = document.getElementById('theme-select');
    const customPanel = document.getElementById('custom-panel');
    const toggleBtn = document.getElementById('toggle-custom');
    const body = document.getElementById('main-body');
    const saveBtn = document.getElementById('save-theme');
    const bgUpload = document.getElementById('bgUpload');
    const clearBgBtn = document.getElementById('clear-bg');
    const imageBgElement = document.getElementById('image-bg-element');
    const fileNameDisplay = document.getElementById('file-name-display');
    const container = document.getElementById('chat-container');
    const dropZone = document.getElementById('drop-zone');
    const resetBtn = document.getElementById('reset-page');

    const pickers = {
        header: document.getElementById('headerColor'),
        bg: document.getElementById('bgColor'),
        user: document.getElementById('userColor'),
        ai: document.getElementById('aiColor')
    };

    function applyCustomMedia() {
        body.style.setProperty('--header', pickers.header.value);
        body.style.setProperty('--bg', pickers.bg.value);
        body.style.setProperty('--user-bg', pickers.user.value);
        body.style.setProperty('--ai-bg', pickers.ai.value);
    }

    function setBackgroundImage(data) {
        if (data && data !== "") {
            imageBgElement.src = data;
            body.classList.add('has-bg-image');
        } else {
            imageBgElement.src = "";
            body.classList.remove('has-bg-image');
        }
    }

    bgUpload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const imgData = event.target.result;
                setBackgroundImage(imgData);
                localStorage.setItem('fanfic_custom_bg', imgData);
            };
            reader.readAsDataURL(file);
        }
    };

    clearBgBtn.onclick = () => {
        setBackgroundImage(null);
        localStorage.removeItem('fanfic_custom_bg');
        bgUpload.value = "";
    };

    saveBtn.onclick = () => {
        const config = {
            header: pickers.header.value,
            bg: pickers.bg.value,
            user: pickers.user.value,
            ai: pickers.ai.value,
            themeMode: themeSelect.value
        };
        localStorage.setItem('fanfic_custom_colors', JSON.stringify(config));
        saveBtn.innerText = "Saved!";
        setTimeout(() => saveBtn.innerText = "Save", 1500);
    };

    window.addEventListener('load', () => {
        // Load BG First
        const savedBg = localStorage.getItem('fanfic_custom_bg');
        if (savedBg) setBackgroundImage(savedBg);

        // Load Theme
        const savedTheme = localStorage.getItem('fanfic_custom_colors');
        if (savedTheme) {
            const config = JSON.parse(savedTheme);
            pickers.header.value = config.header;
            pickers.bg.value = config.bg;
            pickers.user.value = config.user;
            pickers.ai.value = config.ai;
            themeSelect.value = config.themeMode || 'default';
            themeSelect.onchange();
        }

        // Load Content & Scroll
        const lastContent = localStorage.getItem('last_file_content');
        if (lastContent) {
            fileNameDisplay.textContent = `— ${localStorage.getItem('last_file_name')}`;
            dropZone.style.display = 'none';
            resetBtn.style.display = 'block';
            
            const observer = new MutationObserver(() => {
                const savedScroll = localStorage.getItem('last_scroll_pos');
                if (savedScroll) { body.scrollTop = parseInt(savedScroll); }
                observer.disconnect();
            });
            observer.observe(container, { childList: true });
            parseContent(lastContent);
        }
    });

    body.onscroll = () => localStorage.setItem('last_scroll_pos', body.scrollTop);

    themeSelect.onchange = () => {
        body.classList.remove('theme-discord', 'theme-messenger', 'theme-whatsapp', 'theme-chatgpt', 'theme-custom');
        if (themeSelect.value === 'custom') {
            customPanel.style.display = 'flex';
            body.classList.add('theme-custom');
            applyCustomMedia();
        } else {
            customPanel.style.display = 'none';
            if (themeSelect.value !== 'default') body.classList.add(themeSelect.value);
            body.style.removeProperty('--bg'); // Let theme handle it
        }
    };

    Object.values(pickers).forEach(p => p.oninput = () => { if(themeSelect.value === 'custom') applyCustomMedia(); });
    toggleBtn.onclick = () => customPanel.style.display = (customPanel.style.display === 'flex') ? 'none' : 'flex';
    
    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = ".md,.txt";
        input.onchange = e => handleFile(e.target.files[0]);
        input.click();
    };

    resetBtn.onclick = () => {
        localStorage.removeItem('last_file_content');
        localStorage.removeItem('last_file_name');
        localStorage.removeItem('last_scroll_pos');
        location.reload();
    };

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            localStorage.setItem('last_file_content', e.target.result);
            localStorage.setItem('last_file_name', file.name);
            localStorage.setItem('last_scroll_pos', 0);
            location.reload();
        };
        reader.readAsText(file);
    }

    function parseContent(text) {
        container.innerHTML = '';
        const parts = text.split(/##\s*(Prompt|Response):?/gi);
        for (let i = 1; i < parts.length; i += 2) {
            const type = parts[i].toLowerCase();
            let content = (parts[i + 1] || "").split('---')[0].split('Powered by')[0].trim();
            if (content) {
                const isUser = (type === 'prompt');
                const div = document.createElement('div');
                div.className = `bubble ${isUser ? 'user' : 'ai'}`;
                div.innerHTML = `<span class="label">${isUser ? 'User' : 'ChatGPT'}</span><div>${marked.parse(content)}</div>`;
                container.appendChild(div);
            }
        }
    }
</script>
</body>
</html>
