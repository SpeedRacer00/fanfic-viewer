<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        /* --- THEME DEFINITIONS --- */
        :root {
            --bg: #1b2838;
            --header: #171a21;
            --border: #2a475e;
            --text: #c7d5e0;
            --user-bg: #2a475e;
            --user-text: #66c0f4;
            --ai-bg: rgba(30, 32, 38, 0.8);
            --ai-text: #ffffff;
            --header-text: #66c0f4;
            --bubble-outline: 1px solid var(--border);
        }
        
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #dbdee1; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; --bubble-outline: 1px solid var(--border); }
        body.theme-messenger { --bg: #000000; --header: #121212; --border: #222; --text: #fff; --user-bg: #0084ff; --user-text: #fff; --ai-bg: #242526; --ai-text: #fff; --header-text: #fff; --bubble-outline: none; }
        body.theme-whatsapp { --bg: #0b141a; --header: #202c33; --border: #222d34; --text: #e9edef; --user-bg: #005c4b; --user-text: #e9edef; --ai-bg: #202c33; --ai-text: #e9edef; --header-text: #fff; --bubble-outline: none; }
        body.theme-chatgpt { --bg: #212121; --header: #212121; --border: #3d3d3d; --text: #ececec; --user-bg: #2f2f2f; --user-text: #ececec; --ai-bg: transparent; --ai-text: #ececec; --header-text: #ececec; --bubble-outline: none; }
        
        html { background-color: #000; height: 100%; overflow: hidden; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); 
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            padding-top: 60px;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #fixed-bg-layer {
            position: fixed; top: -10vh; left: 0; width: 100vw; height: 125vh;
            z-index: -10; background-color: var(--bg); pointer-events: none;
        }

        #image-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background-size: cover; background-position: center; }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            padding: 0 12px; background: var(--header);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 9999; color: var(--header-text);
            box-sizing: border-box;
        }

        .controls { display: flex; gap: 5px; align-items: center; }
        select, .btn-ui { background: #444; color: #fff; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #custom-panel {
            display: none; background: var(--header); padding: 10px;
            border-bottom: 1px solid var(--border); gap: 12px; align-items: center; justify-content: center;
            position: fixed; top: 60px; left: 0; width: 100%; z-index: 9998; box-sizing: border-box;
        }

        #chat-container { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; width: calc(100% - 40px); }

        .bubble {
            max-width: 85%; padding: 15px; border-radius: 18px; line-height: 1.6;
            word-wrap: break-word; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            background: var(--ai-bg); color: var(--ai-text);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: var(--bubble-outline);
        }
        .user { align-self: flex-end; background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; border: none !important; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .label { font-size: 0.7em; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; opacity: 0.8; }
        #drop-zone { border: 2px dashed #66c0f4; padding: 60px 20px; text-align: center; margin: 40px auto; width: 80%; max-width: 600px; border-radius: 10px; cursor: pointer; background: rgba(0,0,0,0.4); }
    </style>
</head>
<body id="main-body">

<div id="fixed-bg-layer"><div id="image-bg"></div></div>

<header>
    <div style="display:flex; align-items:baseline; gap:6px; overflow:hidden;">
        <span id="header-title" style="font-weight:bold;">Fanfic Viewer</span>
        <span id="file-name-display" style="font-size:0.8em; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
    </div>
    <div class="controls">
        <button id="toggle-custom" class="btn-ui">⚙️</button>
        <select id="theme-select">
            <option value="default">Steam Blue</option>
            <option value="theme-chatgpt">ChatGPT</option>
            <option value="theme-discord">Discord</option>
            <option value="theme-messenger">Messenger</option>
            <option value="theme-whatsapp">WhatsApp</option>
            <option value="custom">Custom</option>
        </select>
        <button id="reset-page" class="btn-ui" style="display:none;">New</button>
    </div>
</header>

<div id="custom-panel">
    <div style="display:flex; gap:8px; font-size:10px;">
        <label>HDR <input type="color" id="headerColor" value="#171a21"></label>
        <label>BG <input type="color" id="bgColor" value="#1b2838"></label>
        <label>USR <input type="color" id="userColor" value="#2a475e"></label>
        <label>AI <input type="color" id="aiColor" value="#1e2026"></label>
    </div>
    <input type="file" id="bgUpload" accept="image/*" style="font-size:9px; width:120px;">
    <button id="save-theme" class="btn-ui" style="background:#28a745; border:none;">Save</button>
</div>

<div id="drop-zone">Click or drop your fanfic here.</div>
<div id="chat-container"></div>

<script>
    const themeSelect = document.getElementById('theme-select');
    const customPanel = document.getElementById('custom-panel');
    const toggleBtn = document.getElementById('toggle-custom');
    const body = document.getElementById('main-body');
    const fileNameDisplay = document.getElementById('file-name-display');
    const container = document.getElementById('chat-container');
    const dropZone = document.getElementById('drop-zone');

    const pickers = {
        header: document.getElementById('headerColor'),
        bg: document.getElementById('bgColor'),
        user: document.getElementById('userColor'),
        ai: document.getElementById('aiColor')
    };

    // --- CONTRAST LOGIC ---
    function getContrastYIQ(hexcolor){
        hexcolor = hexcolor.replace("#", "");
        const r = parseInt(hexcolor.substr(0,2),16);
        const g = parseInt(hexcolor.substr(2,2),16);
        const b = parseInt(hexcolor.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    function rgbToHex(rgb) {
        if (!rgb || !rgb.startsWith('rgb')) return rgb;
        const m = rgb.match(/\d+/g);
        return "#" + ((1 << 24) + (parseInt(m[0]) << 16) + (parseInt(m[1]) << 8) + parseInt(m[2])).toString(16).slice(1);
    }

    function applyCustomMedia() {
        const hColor = pickers.header.value;
        const bColor = pickers.bg.value;
        const uColor = pickers.user.value;
        const aColor = pickers.ai.value;

        body.style.setProperty('--header', hColor);
        body.style.setProperty('--bg', bColor);
        body.style.setProperty('--user-bg', uColor);
        body.style.setProperty('--ai-bg', aColor);

        // Update Text Colors based on brightness
        body.style.setProperty('--header-text', getContrastYIQ(hColor) === '#000000' ? '#000000' : '#66c0f4');
        body.style.setProperty('--text', getContrastYIQ(bColor));
        body.style.setProperty('--user-text', getContrastYIQ(uColor));
        body.style.setProperty('--ai-text', getContrastYIQ(aColor));
    }

    themeSelect.onchange = () => {
        body.classList.remove('theme-discord', 'theme-messenger', 'theme-whatsapp', 'theme-chatgpt', 'theme-custom');
        body.style = ""; // Clear overrides
        
        if (themeSelect.value === 'custom') {
            customPanel.style.display = 'flex';
            body.classList.add('theme-custom');
            applyCustomMedia();
        } else {
            customPanel.style.display = 'none';
            if (themeSelect.value !== 'default') body.classList.add(themeSelect.value);
        }
    };

    Object.values(pickers).forEach(p => p.addEventListener('input', () => {
        if(themeSelect.value === 'custom') applyCustomMedia();
    }));

    toggleBtn.onclick = () => customPanel.style.display = (customPanel.style.display === 'flex') ? 'none' : 'flex';

    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = ".md,.txt";
        input.onchange = e => handleFile(e.target.files[0]);
        input.click();
    };

    function handleFile(file) {
        if (!file) return;
        fileNameDisplay.textContent = `— ${file.name}`;
        const reader = new FileReader();
        reader.onload = e => parseContent(e.target.result);
        reader.readAsText(file);
        dropZone.style.display = 'none';
        document.getElementById('reset-page').style.display = 'block';
    }

    function parseContent(text) {
        container.innerHTML = '';
        const parts = text.split(/##\s*(Prompt|Response):?/gi);
        for (let i = 1; i < parts.length; i += 2) {
            const type = parts[i].toLowerCase();
            let content = (parts[i + 1] || "").split('---')[0].split('Powered by')[0].trim();
            if (content) {
                const isUser = (type === 'prompt');
                const div = document.createElement('div');
                div.className = `bubble ${isUser ? 'user' : 'ai'}`;
                div.innerHTML = `<span class="label">${isUser ? 'User' : 'ChatGPT'}</span><div>${marked.parse(content)}</div>`;
                container.appendChild(div);
            }
        }
    }
</script>
</body>
</html>
