<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root {
            --bg: #1b2838; --header: #171a21; --border: #2a475e; --text: #dcdedc;
            --user-bg: #2a475e; --user-text: #66c0f4; --ai-bg: #3d3d3d; --ai-text: #fff;
            --header-text: #66c0f4; --bubble-outline: 1px solid var(--border);
        }
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #dbdee1; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; --bubble-outline: 1px solid var(--border); }
        body.theme-messenger { --bg: #000000; --header: #121212; --border: #222; --text: #fff; --user-bg: #0084ff; --user-text: #fff; --ai-bg: #242526; --ai-text: #fff; --header-text: #fff; --bubble-outline: none; }
        body.theme-whatsapp { --bg: #0b141a; --header: #202c33; --border: #222d34; --text: #e9edef; --user-bg: #005c4b; --user-text: #e9edef; --ai-bg: #202c33; --ai-text: #e9edef; --header-text: #fff; --bubble-outline: none; }
        body.theme-chatgpt { --bg: #212121; --header: #212121; --border: #3d3d3d; --text: #ececec; --user-bg: #2f2f2f; --user-text: #ececec; --ai-bg: transparent; --ai-text: #ececec; --header-text: #ececec; --bubble-outline: none; }
        
        html { background-color: #000; height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 60px 0 0 0; display: flex; flex-direction: column; height: 100vh;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            padding: 0 12px; background: var(--header); display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 9999; box-sizing: border-box;
        }
        .controls { display: flex; gap: 5px; }
        select, .btn-ui { background: #444; color: #fff; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; font-size: 11px; }
        #chat-container { padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; width: calc(100% - 40px); }
        .bubble {
            max-width: 85%; padding: 15px; border-radius: 18px; line-height: 1.6;
            word-wrap: break-word; background: var(--ai-bg); color: var(--ai-text);
            border: var(--bubble-outline); backdrop-filter: blur(10px);
        }
        .user { align-self: flex-end; background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; border: none !important; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        .label { font-size: 0.7em; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; opacity: 0.7; }
        #drop-zone { border: 2px dashed #66c0f4; padding: 60px 20px; text-align: center; margin: 40px auto; width: 80%; border-radius: 10px; background: rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<header>
    <div style="overflow:hidden; flex:1;">
        <b id="header-title">Fanfic Viewer</b> <span id="file-name-display" style="font-size:0.8em; opacity:0.5;"></span>
    </div>
    <div class="controls">
        <select id="theme-select">
            <option value="default">Steam</option>
            <option value="theme-chatgpt">GPT</option>
            <option value="theme-discord">Discord</option>
            <option value="theme-messenger">MSG</option>
            <option value="theme-whatsapp">WA</option>
        </select>
        <button id="reset-page" class="btn-ui">New</button>
    </div>
</header>

<div id="drop-zone">Tap to Load Fanfic</div>
<div id="chat-container"></div>

<script>
    const container = document.getElementById('chat-container');
    const dropZone = document.getElementById('drop-zone');
    const themeSelect = document.getElementById('theme-select');
    const nameDisplay = document.getElementById('file-name-display');

    // Theme Switcher
    themeSelect.onchange = () => {
        document.body.className = themeSelect.value === 'default' ? '' : themeSelect.value;
    };

    // File Loading
    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                nameDisplay.textContent = "— " + file.name;
                const reader = new FileReader();
                reader.onload = (event) => parseContent(event.target.result);
                reader.readAsText(file);
            }
        };
        input.click();
    };

    document.getElementById('reset-page').onclick = () => location.reload();

    function parseContent(text) {
        container.innerHTML = '<i>Loading and Rendering...</i>';
        dropZone.style.display = 'none';

        // Split by the ## Prompt or ## Response markers
        // This is safer for mobile than complex regex loops
        const parts = text.split(/##\s*(Prompt|Response):?/gi);
        
        // Clear loading message
        container.innerHTML = '';

        // parts[0] is usually the header junk, we skip it
        for (let i = 1; i < parts.length; i += 2) {
            const type = parts[i].toLowerCase();
            let content = parts[i + 1] || "";

            // Clean up timestamps and exporter footer
            content = content.replace(/^\d{1,2}\/\d{1,2}\/\d{4}.*?\n/i, '');
            if (i + 2 >= parts.length) {
                content = content.split('---')[0].split('Powered by')[0];
            }

            if (content.trim()) {
                const isUser = (type === 'prompt');
                const div = document.createElement('div');
                div.className = `bubble ${isUser ? 'user' : 'ai'}`;
                
                const label = document.createElement('span');
                label.className = 'label';
                label.innerText = isUser ? 'User' : 'ChatGPT';
                
                const textBody = document.createElement('div');
                textBody.innerHTML = marked.parse(content.trim());
                
                div.appendChild(label);
                div.appendChild(textBody);
                container.appendChild(div);
            }
        }
    }
</script>
</body>
</html>
