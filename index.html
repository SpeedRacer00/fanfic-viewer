<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Viewer</title>
    <script>
    /** marked - v4.3.0 */
    !function(e,t){"object"==typeof exports&&"undefined"!=typeof module?module.exports=t():"function"==typeof define&&define.amd?define(t):(e=e||self).marked=t()}(this,(function(){"use strict";function e(){return{baseUrl:null,breaks:!1,gfm:!0,headerIds:!0,headerPrefix:"",highlight:null,langPrefix:"language-",mangle:!0,pedantic:!1,renderer:null,sanitize:!1,sanitizer:null,silent:!1,smartLists:!1,smartypants:!1,tokenizer:null,walkTokens:null}}const t=/[&<>"']/g,n={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};function r(e){return n[e]}function i(e,n){if(n){if(t.test(e))return e.replace(t,r)}else if(/[&<>"']/.test(e))return e.replace(/[&<>"']/g,r);return e}function s(e){return e}function l(e,t){return Object.prototype.hasOwnProperty.call(e,t)}function o(e,t,n){if(null==e)throw new Error("marked(): input parameter is undefined or null");if("string"!=typeof e)throw new Error("marked(): input parameter must be a string of markdown from lib");return(n=Object.assign({},o.defaults,n)).silent?i(e):e}o.defaults=e(),o.parse=o;window.marked={parse:function(e){return e.replace(/\n/g,"<br>")}};return o}));

    </script>
    <style>
        :root {
            --bg: #1b2838; --header: #171a21; --border: #2a475e; --text: #dcdedc;
            --user-bg: #2a475e; --user-text: #66c0f4; --ai-bg: #3d3d3d; --ai-text: #fff;
            --header-text: #66c0f4; --bubble-outline: 1px solid var(--border);
        }
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #dbdee1; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; --bubble-outline: 1px solid var(--border); }
        body.theme-messenger { --bg: #000000; --header: #121212; --border: #222; --text: #fff; --user-bg: #0084ff; --user-text: #fff; --ai-bg: #242526; --ai-text: #fff; --header-text: #fff; --bubble-outline: none; }
        body.theme-whatsapp { --bg: #0b141a; --header: #202c33; --border: #222d34; --text: #e9edef; --user-bg: #005c4b; --user-text: #e9edef; --ai-bg: #202c33; --ai-text: #e9edef; --header-text: #fff; --bubble-outline: none; }
        body.theme-chatgpt { --bg: #212121; --header: #212121; --border: #3d3d3d; --text: #ececec; --user-bg: #2f2f2f; --user-text: #ececec; --ai-bg: transparent; --ai-text: #ececec; --header-text: #ececec; --bubble-outline: none; }
        body.theme-custom { --bubble-outline: none; }
        html { background-color: #000; height: 100%; overflow: hidden; }
        body { font-family: 'Segoe UI', sans-serif; background-color: transparent; color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; padding-top: 60px; height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        #fixed-bg-layer { position: fixed; top: -10vh; left: 0; width: 100vw; height: 125vh; z-index: -10; background-color: var(--bg); pointer-events: none; }
        #video-bg, #image-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
        #video-bg { display: none; }
        #image-bg { background-size: cover; background-position: center; background-repeat: no-repeat; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; padding: 0 12px; background: var(--header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 9999; color: var(--header-text); box-sizing: border-box; gap: 10px; }
        .header-left { display: flex; align-items: baseline; gap: 6px; overflow: hidden; flex: 1; }
        #header-title { font-weight: bold; white-space: nowrap; flex-shrink: 0; }
        #file-name-display { font-size: 0.8em; opacity: 0.6; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .controls { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
        select, .btn-ui { background: #444; color: #fff; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        #custom-panel { display: none; background: var(--header); padding: 10px 15px; border-bottom: 1px solid var(--border); gap: 12px; align-items: center; justify-content: center; font-size: 10px; color: var(--header-text); flex-wrap: wrap; position: fixed; top: 60px; left: 0; width: 100%; z-index: 9998; box-sizing: border-box; }
        .color-group { display: flex; align-items: center; gap: 4px; }
        input[type="color"] { border: none; width: 18px; height: 18px; cursor: pointer; background: none; padding: 0; }
        .img-upload { font-size: 9px; background: #333; border: 1px solid #555; color: #ccc; border-radius: 3px; width: 110px; }
        #chat-container { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; width: calc(100% - 40px); }
        .bubble { max-width: 85%; padding: 15px; border-radius: 18px; line-height: 1.6; word-wrap: break-word; box-shadow: 0 4px 20px rgba(0,0,0,0.5); background: var(--ai-bg); color: var(--ai-text); border: var(--bubble-outline); }
        .user { align-self: flex-end; background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; border: none !important; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        .label { font-size: 0.7em; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; opacity: 0.7; }
        #drop-zone { border: 2px dashed #66c0f4; padding: 60px 20px; text-align: center; margin: 40px auto; width: 80%; max-width: 600px; border-radius: 10px; cursor: pointer; background: rgba(0,0,0,0.4); z-index: 10; position: relative; }
    </style>
</head>
<body id="main-body">
<div id="fixed-bg-layer"><div id="image-bg"></div><video id="video-bg" autoplay loop muted playsinline></video></div>
<header>
    <div class="header-left"><span id="header-title">Fanfic Viewer</span><span id="file-name-display"></span></div>
    <div class="controls">
        <button id="toggle-custom" class="btn-ui">⚙️</button>
        <select id="theme-select">
            <option value="default">Steam Blue</option>
            <option value="theme-chatgpt">ChatGPT</option>
            <option value="theme-discord">Discord</option>
            <option value="theme-messenger">Messenger</option>
            <option value="theme-whatsapp">WhatsApp</option>
            <option value="custom">Custom</option>
        </select>
        <button id="reset-page" class="btn-ui" style="display:none;">New</button>
    </div>
</header>
<div id="custom-panel">
    <div class="color-group"><label>HDR</label><input type="color" id="headerColor" value="#171a21"></div>
    <div class="color-group"><label>BG</label><input type="color" id="bgColor" value="#1b2838"></div>
    <div class="color-group"><label>USR</label><input type="color" id="userColor" value="#2a475e"></div>
    <div class="color-group"><label>AI</label><input type="color" id="aiColor" value="#3d3d3d"></div>
    <input type="file" id="bgUpload" accept="image/*,video/mp4" class="img-upload">
    <button id="save-theme" class="btn-ui" style="background: #28a745; border:none; height: 22px;">Save</button>
</div>
<div id="drop-zone">Click or drop your fanfic here.</div>
<div id="chat-container"></div>
<script>
    const themeSelect=document.getElementById('theme-select'),customPanel=document.getElementById('custom-panel'),toggleBtn=document.getElementById('toggle-custom'),body=document.getElementById('main-body'),fileNameDisplay=document.getElementById('file-name-display'),saveBtn=document.getElementById('save-theme'),bgUpload=document.getElementById('bgUpload'),videoBg=document.getElementById('video-bg'),imageBg=document.getElementById('image-bg'),bgLayer=document.getElementById('fixed-bg-layer'),container=document.getElementById('chat-container'),dropZone=document.getElementById('drop-zone'),resetBtn=document.getElementById('reset-page');
    let currentMedia="",mediaType="",currentFileName="";
    const pickers={header:document.getElementById('headerColor'),bg:document.getElementById('bgColor'),user:document.getElementById('userColor'),ai:document.getElementById('aiColor')};

    function applyCustomMedia(){
        body.style.setProperty('--header',pickers.header.value);body.style.setProperty('--bg',pickers.bg.value);bgLayer.style.setProperty('--bg',pickers.bg.value);body.style.setProperty('--user-bg',pickers.user.value);body.style.setProperty('--ai-bg',pickers.ai.value);
        videoBg.style.display="none";imageBg.style.backgroundImage="none";
        if(mediaType==="video"){videoBg.src=currentMedia;videoBg.style.display="block";videoBg.play();}else if(mediaType==="image"){imageBg.style.backgroundImage=`url('${currentMedia}')`;}
    }

    bgUpload.onchange=(e)=>{
        const f=e.target.files[0];if(!f)return;mediaType=f.type.startsWith("video")?"video":"image";
        const r=new FileReader();r.onload=(ev)=>{currentMedia=ev.target.result;applyCustomMedia();};r.readAsDataURL(f);
    };

    saveBtn.onclick=()=>{
        applyCustomMedia();
        localStorage.setItem('fanfic-custom-theme',JSON.stringify({header:pickers.header.value,bg:pickers.bg.value,user:pickers.user.value,ai:pickers.ai.value,lastMode:themeSelect.value,savedImg:(mediaType==="image")?currentMedia:null}));
        alert('Theme saved!');
    };

    window.onload=()=>{
        const s=localStorage.getItem('fanfic-custom-theme');
        if(s){const d=JSON.parse(s);Object.keys(pickers).forEach(k=>{if(d[k])pickers[k].value=d[k];});if(d.savedImg){currentMedia=d.savedImg;mediaType="image";}if(d.lastMode==='custom'){themeSelect.value='custom';toggleBtn.style.display='block';body.classList.add('theme-custom');applyCustomMedia();}}
        const lc=localStorage.getItem('last_file_content'),lf=localStorage.getItem('last_file_name');
        if(lc&&lf){currentFileName=lf;fileNameDisplay.textContent=`— ${lf}`;parseContent(lc);dropZone.style.display='none';resetBtn.style.display='block';}
    };

    toggleBtn.onclick=()=>{customPanel.style.display=(customPanel.style.display==='flex')?'none':'flex';};
    themeSelect.onchange=()=>{
        body.classList.remove('theme-custom');
        if(themeSelect.value==='custom'){toggleBtn.style.display='block';customPanel.style.display='flex';body.classList.add('theme-custom');applyCustomMedia();}
        else{toggleBtn.style.display='none';customPanel.style.display='none';body.className=themeSelect.value==='default'?'':themeSelect.value;}
    };

    dropZone.onclick=()=>{const i=document.createElement('input');i.type='file';i.accept=".md,.txt";i.onchange=e=>handleFile(e.target.files[0]);i.click();};
    resetBtn.onclick=()=>{localStorage.removeItem('last_file_content');localStorage.removeItem('last_file_name');location.reload();};

    function handleFile(f){if(!f)return;currentFileName=f.name;fileNameDisplay.textContent=`— ${f.name}`;const r=new FileReader();r.onload=e=>{localStorage.setItem('last_file_content',e.target.result);localStorage.setItem('last_file_name',f.name);parseContent(e.target.result);dropZone.style.display='none';resetBtn.style.display='block';};r.readAsText(f);}

    function parseContent(text){
        container.innerHTML='';
        const firstIdx = text.search(/##\s+(Prompt|Response)/i);
        const actual = firstIdx !== -1 ? text.substring(firstIdx) : text;
        const segments = actual.split(/(?=##\s+(?:Prompt|Response))/gi);
        segments.forEach(seg=>{
            const isP=/##\s+Prompt/i.test(seg),isR=/##\s+Response/i.test(seg);
            if(!isP&&!isR)return;
            const d=document.createElement('div');d.className=`bubble ${isP?'user':'ai'}`;
            let clean=seg.replace(/^##\s+(?:Prompt|Response):?\s*/i,'').trim();
            clean=clean.replace(/^\d{1,2}\/\d{1,2}\/\d{4},.*?\n/,'').trim();
            d.innerHTML=`<span class="label">${isP?'User':'ChatGPT'}</span>`+(window.marked?marked.parse(clean):clean);
            container.appendChild(d);
        });
        body.scrollTo(0,0);
    }
</script>
</body>
</html>
