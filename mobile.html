<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        /* --- CORE THEMES --- */
        :root {
            --bg: #1b2838; --header: #171a21; --border: #2a475e; --text: #c7d5e0;
            --user-bg: #2a475e; --user-text: #ffffff; --ai-bg: #1e2026; --ai-text: #ffffff;
            --header-text: #66c0f4; --bubble-outline: 1px solid var(--border);
        }
        
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #ffffff; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; }
        body.theme-messenger { --bg: #000000; --header: #121212; --border: #222; --text: #fff; --user-bg: #0084ff; --user-text: #fff; --ai-bg: #242526; --ai-text: #fff; }
        body.theme-whatsapp { --bg: #0b141a; --header: #202c33; --border: #222d34; --text: #e9edef; --user-bg: #005c4b; --user-text: #ffffff; --ai-bg: #202c33; --ai-text: #e9edef; }
        body.theme-chatgpt { --bg: #212121; --header: #212121; --border: #3d3d3d; --text: #ececec; --user-bg: #2f2f2f; --user-text: #ffffff; --ai-bg: #212121; --ai-text: #ececec; }
        
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; overflow-x: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            display: flex; flex-direction: column;
            padding-top: 70px;
            background-color: var(--bg);
            scroll-behavior: smooth;
        }

        #fixed-bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10; background-size: cover; background-position: center;
            background-color: var(--bg); /* Fallback color */
        }

        #bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            padding: 0 12px; background: var(--header);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 9999; box-sizing: border-box;
        }

        .btn-ui { 
            background: #444; color: #fff; border: 1px solid #666; 
            padding: 10px 14px; border-radius: 8px; font-size: 14px; 
            text-decoration: none; display: inline-flex; align-items: center;
            justify-content: center; box-sizing: border-box;
            min-height: 44px;
        }

        /* Fixed Button Alignment */
        input[type="file"].btn-ui {
            width: 100%;
            display: block;
            line-height: 24px;
        }

        #custom-panel {
            display: none; background: var(--header); padding: 20px;
            border-bottom: 1px solid var(--border); 
            position: fixed; top: 65px; left: 0; width: 100%; z-index: 9998; 
            box-sizing: border-box; flex-direction: column; gap: 15px;
            max-height: calc(100vh - 70px); overflow-y: auto;
        }

        .color-row { display: flex; justify-content: space-between; align-items: center; color: white; font-size: 14px; font-weight: bold; }
        input[type="color"] { width: 60px; height: 35px; border: 1px solid #666; border-radius: 6px; background: none; padding: 0; }

        #chat-container { 
            flex: 1; padding: 15px; display: flex; flex-direction: column; 
            gap: 15px; width: 100%; box-sizing: border-box; position: relative;
        }

        .bubble {
            max-width: 92%; padding: 14px 18px; border-radius: 22px; 
            font-size: 16px; line-height: 1.5;
            background-color: var(--ai-bg); color: var(--ai-text); border: var(--bubble-outline);
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
        }
        .user { align-self: flex-end; background-color: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; border: none !important; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .label { font-size: 0.75em; text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: 800; opacity: 0.6; }
        
        #drop-zone { 
            border: 2px dashed #66c0f4; padding: 70px 20px; text-align: center; 
            margin: 20px; border-radius: 18px; background: rgba(0,0,0,0.5); color: #66c0f4; font-weight: bold;
        }
    </style>
</head>
<body id="main-body">

<div id="fixed-bg-layer"><video id="bg-video" autoplay muted loop playsinline></video></div>

<header>
    <div style="display: flex; flex-direction: column; overflow: hidden; max-width: 45%;">
        <span style="font-weight:bold; font-size: 1.1em; color: var(--header-text);">Fanfic Mobile</span>
        <span id="file-name-display" style="font-size:0.7em; opacity:0.6; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
    </div>
    <div class="controls" style="display:flex; gap:6px;">
        <a href="index.html" class="btn-ui">💻 PC</a>
        <button id="toggle-custom" class="btn-ui">⚙️</button>
        <button id="reset-page" class="btn-ui" style="display:none;">New</button>
    </div>
</header>

<div id="custom-panel">
    <select id="theme-select" class="btn-ui" style="width: 100%;">
        <option value="default">Steam Blue</option>
        <option value="theme-chatgpt">ChatGPT</option>
        <option value="theme-discord">Discord</option>
        <option value="theme-messenger">Messenger</option>
        <option value="theme-whatsapp">WhatsApp</option>
        <option value="custom">Custom Colors</option>
    </select>
    
    <div id="mobile-pickers" style="display:none; flex-direction:column; gap:12px;">
        <div class="color-row">Header <input type="color" id="headerColor" value="#171a21"></div>
        <div class="color-row">Background <input type="color" id="bgColor" value="#1b2838"></div>
        <div class="color-row">User Bubble <input type="color" id="userColor" value="#2a475e"></div>
        <div class="color-row">AI Bubble <input type="color" id="aiColor" value="#1e2026"></div>
    </div>

    <input type="file" id="bgUpload" accept="image/*,video/mp4" class="btn-ui">
    <button id="clear-bg" class="btn-ui">Clear Background</button>
    <button id="save-theme" class="btn-ui" style="background:#28a745; border:none; font-weight:bold;">Save Settings</button>
</div>

<div id="drop-zone">Tap to upload your fanfic</div>
<div id="chat-container"></div>

<script>
    const themeSelect = document.getElementById('theme-select');
    const customPanel = document.getElementById('custom-panel');
    const mobilePickers = document.getElementById('mobile-pickers');
    const toggleBtn = document.getElementById('toggle-custom');
    const body = document.getElementById('main-body');
    const fixedBg = document.getElementById('fixed-bg-layer');
    const bgVideo = document.getElementById('bg-video');
    const saveBtn = document.getElementById('save-theme');
    const bgUpload = document.getElementById('bgUpload');
    const clearBgBtn = document.getElementById('clear-bg');
    const container = document.getElementById('chat-container');
    const dropZone = document.getElementById('drop-zone');
    const resetBtn = document.getElementById('reset-page');

    const pickers = {
        header: document.getElementById('headerColor'),
        bg: document.getElementById('bgColor'),
        user: document.getElementById('userColor'),
        ai: document.getElementById('aiColor')
    };

    function getContrastYIQ(hexcolor){
        hexcolor = hexcolor.replace("#", "");
        if(hexcolor.length === 3) hexcolor = hexcolor.split('').map(s => s+s).join('');
        const r = parseInt(hexcolor.substr(0,2),16);
        const g = parseInt(hexcolor.substr(2,2),16);
        const b = parseInt(hexcolor.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    function setBackgroundMedia(data) {
        if (!data) {
            fixedBg.style.backgroundImage = 'none';
            bgVideo.style.display = 'none';
            bgVideo.pause();
            bgVideo.src = "";
            fixedBg.style.backgroundColor = 'var(--bg)';
            return;
        }

        const isVideo = data.startsWith('data:video') || data.includes('.mp4');
        if (isVideo) {
            fixedBg.style.backgroundImage = 'none';
            bgVideo.src = data;
            bgVideo.style.display = 'block';
            bgVideo.load();
            bgVideo.play().catch(() => {});
            fixedBg.style.backgroundColor = 'transparent'; // Fix: show video
        } else {
            bgVideo.style.display = 'none';
            bgVideo.pause();
            bgVideo.src = "";
            fixedBg.style.backgroundImage = `url(${data})`;
            fixedBg.style.backgroundColor = 'transparent'; // Fix: show image
        }
    }

    bgUpload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const mediaData = event.target.result;
                setBackgroundMedia(mediaData);
                try { 
                    localStorage.setItem('fanfic_custom_bg', mediaData); 
                } catch (err) { 
                    alert("File too large to save for next time, but it will work now!"); 
                }
            };
            reader.readAsDataURL(file);
        }
    };

    clearBgBtn.onclick = () => {
        setBackgroundMedia(null);
        localStorage.removeItem('fanfic_custom_bg');
        bgUpload.value = "";
    };

    function applyCustomMedia() {
        if(themeSelect.value !== 'custom') return;
        body.style.setProperty('--header', pickers.header.value);
        body.style.setProperty('--bg', pickers.bg.value);
        body.style.setProperty('--user-bg', pickers.user.value);
        body.style.setProperty('--ai-bg', pickers.ai.value);
        body.style.setProperty('--user-text', getContrastYIQ(pickers.user.value));
        body.style.setProperty('--ai-text', getContrastYIQ(pickers.ai.value));
        
        // If no image is set, use the custom picker color
        if(!localStorage.getItem('fanfic_custom_bg')) {
            fixedBg.style.backgroundColor = pickers.bg.value;
        }
    }

    themeSelect.onchange = () => {
        body.className = ''; 
        mobilePickers.style.display = (themeSelect.value === 'custom') ? 'flex' : 'none';
        ['--header', '--bg', '--user-bg', '--ai-bg', '--user-text', '--ai-text'].forEach(p => body.style.removeProperty(p));
        
        if (themeSelect.value === 'custom') {
            body.classList.add('theme-custom');
            applyCustomMedia();
        } else {
            if (themeSelect.value !== 'default') body.classList.add(themeSelect.value);
        }

        // Final check: media always wins over solid color
        const savedBg = localStorage.getItem('fanfic_custom_bg');
        if (savedBg) {
            setBackgroundMedia(savedBg);
        } else {
            fixedBg.style.backgroundColor = (themeSelect.value === 'custom') ? pickers.bg.value : 'var(--bg)';
        }
    };

    saveBtn.onclick = () => {
        const config = {
            header: pickers.header.value, bg: pickers.bg.value,
            user: pickers.user.value, ai: pickers.ai.value, themeMode: themeSelect.value
        };
        localStorage.setItem('fanfic_custom_colors', JSON.stringify(config));
        saveBtn.innerText = "Saved!";
        setTimeout(() => { 
            saveBtn.innerText = "Save Settings"; 
            customPanel.style.display = 'none'; 
        }, 1000);
    };

    window.addEventListener('load', () => {
        const savedBg = localStorage.getItem('fanfic_custom_bg');
        if (savedBg) setTimeout(() => setBackgroundMedia(savedBg), 50);

        const savedTheme = localStorage.getItem('fanfic_custom_colors');
        if (savedTheme) {
            const config = JSON.parse(savedTheme);
            Object.keys(pickers).forEach(key => { if(config[key]) pickers[key].value = config[key]; });
            themeSelect.value = config.themeMode || 'default';
        }
        themeSelect.onchange();

        const lastContent = localStorage.getItem('last_file_content');
        if (lastContent) {
            document.getElementById('file-name-display').textContent = localStorage.getItem('last_file_name');
            dropZone.style.display = 'none';
            resetBtn.style.display = 'inline-flex';
            parseContent(lastContent);
            setTimeout(() => {
                const savedScroll = localStorage.getItem('fanfic_scroll_pos');
                if (savedScroll) body.scrollTop = parseInt(savedScroll);
            }, 200);
        }
    });

    let scrollTimeout;
    body.onscroll = () => {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => { localStorage.setItem('fanfic_scroll_pos', body.scrollTop); }, 250);
    };

    Object.values(pickers).forEach(p => p.oninput = applyCustomMedia);
    toggleBtn.onclick = () => customPanel.style.display = (customPanel.style.display === 'flex') ? 'none' : 'flex';
    
    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = ".md,.txt";
        input.onchange = e => handleFile(e.target.files[0]);
        input.click();
    };

    resetBtn.onclick = () => {
        const bg = localStorage.getItem('fanfic_custom_bg');
        const theme = localStorage.getItem('fanfic_custom_colors');
        localStorage.clear();
        if(bg) localStorage.setItem('fanfic_custom_bg', bg);
        if(theme) localStorage.setItem('fanfic_custom_colors', theme);
        location.reload();
    };

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            localStorage.setItem('last_file_content', e.target.result);
            localStorage.setItem('last_file_name', file.name);
            localStorage.setItem('fanfic_scroll_pos', 0);
            location.reload();
        };
        reader.readAsText(file);
    }

    function parseContent(text) {
        container.innerHTML = '';
        const parts = text.split(/##\s*(Prompt|Response):?/gi);
        for (let i = 1; i < parts.length; i += 2) {
            const type = parts[i].toLowerCase();
            let content = (parts[i + 1] || "").split('---')[0].split('Powered by')[0].trim();
            if (content) {
                const isUser = (type === 'prompt');
                const div = document.createElement('div');
                div.className = `bubble ${isUser ? 'user' : 'ai'}`;
                div.innerHTML = `<span class="label">${isUser ? 'User' : 'ChatGPT'}</span><div>${marked.parse(content)}</div>`;
                container.appendChild(div);
            }
        }
    }
</script>
</body>
</html>
